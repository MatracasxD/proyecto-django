<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Curso Django{% endblock %}</title>
    {% load static %}

    <!-- Bootstrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" type="text/css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-0">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{% url 'principal' %}">
                {% block nombre_pagina %}Curso Django{% endblock %}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'principal' %}">Principal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'contacto' %}">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cursos' %}">Cursos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    {% if request.resolver_match.url_name != 'principal' %}
    <div class="page-header">
        <div class="container">
            <h3 class="mb-0">{% block page_header_title %}{% endblock %}</h3>
        </div>
    </div>
    {% endif %}

    <!-- BREADCRUMBS -->
    {% block breadcrumbs %}{% endblock %}

    <!-- MAIN CONTENT -->
    <main class="py-4">
        {% block contenido %}{% endblock %}
    </main>

    <!-- Bootstrap JS desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
